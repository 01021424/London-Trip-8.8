<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1923">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
<title>伦敦六日行程规划 - 离线地图</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0f1923;--card:#172332;--card2:#1c2d3f;--border:#2a3f55;
  --text:#e8edf2;--text2:#8da0b5;--accent:#f0a500;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;}
#sidebar{width:400px;min-width:400px;height:100vh;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;z-index:100;}
.sidebar-header{padding:18px 22px 14px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,#172332 0%,#1a2940 100%);flex-shrink:0;}
.sidebar-header h1{font-size:20px;color:var(--accent);margin-bottom:3px;display:flex;align-items:center;gap:8px;}
.sidebar-header p{font-size:11px;color:var(--text2);letter-spacing:.5px;}
.day-tabs{display:flex;padding:6px 10px;gap:4px;background:var(--bg);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;}
.day-tabs::-webkit-scrollbar{height:0;}
.day-tab{padding:7px 10px;border-radius:8px;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;border:1.5px solid transparent;transition:all .2s;color:var(--text2);background:transparent;display:flex;align-items:center;gap:4px;flex-shrink:0;}
.day-tab:hover{background:var(--card2);color:var(--text);}
.day-tab.active{color:#fff;border-color:currentColor;}
.day-tab .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.day-content{flex:1;overflow-y:auto;padding:14px 18px;}
.day-content::-webkit-scrollbar{width:3px;}
.day-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.day-title{font-size:14px;font-weight:700;margin-bottom:2px;display:flex;align-items:center;gap:6px;}
.day-title .badge{font-size:10px;padding:2px 7px;border-radius:8px;color:#fff;font-weight:500;}
.day-subtitle{font-size:11px;color:var(--text2);margin-bottom:14px;line-height:1.5;}

.hotel-card{border-radius:8px;padding:8px 12px;margin-bottom:8px;font-size:11.5px;display:flex;align-items:center;gap:8px;}
.hotel-card.depart{background:rgba(240,165,0,.1);border:1px solid rgba(240,165,0,.25);}
.hotel-card.depart .hl{color:#f0a500;}
.hotel-card.return-h{background:rgba(22,160,133,.1);border:1px solid rgba(22,160,133,.25);}
.hotel-card.return-h .hl{color:#16a085;}
.hotel-card.checkout{background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.25);}
.hotel-card.checkout .hl{color:#e74c3c;}
.hotel-card .hicon{font-size:15px;flex-shrink:0;}
.hotel-card .hname{font-weight:600;font-size:12px;}
.hotel-card .haddr{color:var(--text2);font-size:10.5px;margin-top:1px;}
.hotel-card .hcancel{color:#e74c3c;font-weight:600;font-size:10px;margin-top:2px;}

.transport-line{display:flex;align-items:center;gap:6px;padding:3px 0 3px 26px;font-size:10.5px;color:var(--text2);}
.transport-line .ticon{font-size:12px;flex-shrink:0;width:16px;text-align:center;}
.transport-line .tdot{width:6px;height:1px;background:var(--border);flex:1;max-width:40px;}

.timeline{position:relative;padding-left:26px;}
.timeline::before{content:'';position:absolute;left:7px;top:8px;bottom:8px;width:2px;border-radius:1px;background:var(--accent);opacity:.2;}
.timeline-item{position:relative;margin-bottom:14px;animation:fadeSlideIn .3s ease-out both;}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.timeline-item::before{content:'';position:absolute;left:-22px;top:5px;width:10px;height:10px;border-radius:50%;border:2px solid var(--accent);background:var(--card);}
.timeline-item .time{font-size:10px;font-weight:700;margin-bottom:1px;opacity:.8;}
.timeline-item .name{font-size:13px;font-weight:600;margin-bottom:1px;line-height:1.3;}
.timeline-item .desc{font-size:11px;color:var(--text2);line-height:1.4;}
.timeline-item .tag{display:inline-block;font-size:9px;padding:1px 6px;border-radius:3px;margin-top:2px;font-weight:500;opacity:.85;}
.timeline-item.transfer{opacity:.6;}
.timeline-item.transfer .name{font-size:11px;}

.route-note{background:var(--card2);border-radius:8px;padding:10px 12px;margin-top:6px;margin-bottom:12px;font-size:11px;color:var(--text2);line-height:1.6;border-left:3px solid var(--accent);display:flex;align-items:flex-start;gap:7px;}
.route-note .ricon{flex-shrink:0;font-size:13px;}

#mapBox{flex:1;height:100vh;position:relative;overflow:hidden;background:#1a1f2e;}
#mapCanvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;}
#mapImg{position:absolute;transform-origin:center center;image-rendering:auto;user-select:none;-webkit-user-drag:none;}
.marker{position:absolute;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:11px;border:2.5px solid #fff;box-shadow:0 2px 10px rgba(0,0,0,.6);cursor:pointer;z-index:20;transition:transform .2s;}
.marker:hover{transform:scale(1.3);z-index:30;}
.marker .mlabel{display:none;position:absolute;top:-32px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.88);color:#fff;padding:4px 10px;border-radius:5px;font-size:10px;white-space:nowrap;font-weight:500;pointer-events:none;}
.marker:hover .mlabel{display:block;}
.marker-sm{width:22px;height:22px;font-size:9px;border-width:2px;}
.hotel-pin{position:absolute;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;border:2.5px solid #fff;box-shadow:0 2px 10px rgba(0,0,0,.6);cursor:pointer;z-index:25;transition:transform .2s;background:#f0a500;}
.hotel-pin:hover{transform:scale(1.25);z-index:30;}
.hotel-pin .mlabel{display:none;position:absolute;top:-34px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.88);color:#fff;padding:4px 10px;border-radius:5px;font-size:10px;white-space:nowrap;font-weight:500;pointer-events:none;}
.hotel-pin:hover .mlabel{display:block;}

#mapTooltip{position:absolute;display:none;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;z-index:50;max-width:220px;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.5);}
#mapTooltip .tt-title{font-size:13px;font-weight:700;margin-bottom:2px;}
#mapTooltip .tt-time{font-size:10px;opacity:.7;margin-bottom:4px;}
#mapTooltip .tt-desc{font-size:11px;opacity:.8;line-height:1.5;}

/* Spot detail panel */
#spotDetail{position:absolute;top:16px;right:16px;width:340px;max-height:calc(100vh - 32px);background:var(--card);border:1px solid var(--border);border-radius:14px;z-index:60;display:none;flex-direction:column;box-shadow:0 12px 40px rgba(0,0,0,.6);overflow:hidden;animation:slideInRight .25s ease-out;}
@keyframes slideInRight{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
#spotDetail.active{display:flex;}
.sp-detail-header{padding:16px 18px 12px;border-bottom:1px solid var(--border);position:relative;}
.sp-detail-header .sp-close{position:absolute;top:10px;right:10px;width:28px;height:28px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.05);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s;}
.sp-detail-header .sp-close:hover{background:rgba(255,255,255,.1);color:#fff;}
.sp-detail-header .sp-tag{font-size:9px;padding:2px 8px;border-radius:6px;color:#fff;font-weight:500;display:inline-block;margin-bottom:6px;}
.sp-detail-header .sp-title{font-size:16px;font-weight:700;line-height:1.3;margin-bottom:3px;}
.sp-detail-header .sp-meta{font-size:10px;color:var(--text2);display:flex;gap:10px;flex-wrap:wrap;}
.sp-detail-body{padding:14px 18px 16px;overflow-y:auto;flex:1;}
.sp-detail-body .sp-section{margin-bottom:12px;}
.sp-detail-body .sp-section:last-child{margin-bottom:0;}
.sp-detail-body .sp-section h4{font-size:11px;color:var(--accent);font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;}
.sp-detail-body .sp-section p{font-size:12px;color:var(--text2);line-height:1.65;}
.sp-detail-body .sp-section ul{list-style:none;padding:0;}
.sp-detail-body .sp-section ul li{font-size:12px;color:var(--text2);line-height:1.65;padding-left:14px;position:relative;margin-bottom:2px;}
.sp-detail-body .sp-section ul li::before{content:'•';position:absolute;left:0;color:var(--accent);}
.sp-detail-body .sp-tip{background:rgba(240,165,0,.08);border-left:3px solid var(--accent);padding:8px 12px;border-radius:0 8px 8px 0;margin-top:10px;}
.sp-detail-body .sp-tip p{font-size:11px;color:var(--text);font-weight:500;}

.legend-bar{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(15,25,35,.92);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:10px;padding:8px 16px;display:flex;gap:12px;z-index:40;font-size:10px;flex-wrap:wrap;justify-content:center;}
.legend-item{display:flex;align-items:center;gap:4px;white-space:nowrap;}
.legend-color{width:18px;height:3px;border-radius:2px;}

.map-ctrl{position:absolute;top:12px;right:12px;z-index:40;display:flex;flex-direction:column;gap:4px;}
.map-ctrl button{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:rgba(23,35,50,.9);color:var(--text);cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1;}
.map-ctrl button:hover{background:var(--card2);}
.map-ctrl button svg{width:16px;height:16px;stroke:var(--text);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

@media(max-width:900px){
  body{flex-direction:column;}
  #sidebar{width:100%;min-width:100%;height:40vh;}
  #mapBox{height:60vh;}
}

.rec-marker{position:absolute;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;border:2px solid #fff;box-shadow:0 1px 6px rgba(0,0,0,.5);cursor:pointer;z-index:15;transition:transform .2s;}
.rec-marker:hover{transform:scale(1.3);z-index:30;}
.rec-marker .mlabel{display:none;position:absolute;top:-28px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.88);color:#fff;padding:3px 8px;border-radius:4px;font-size:9px;white-space:nowrap;font-weight:500;pointer-events:none;}
.rec-marker:hover .mlabel{display:block;}
.rec-food{background:#e67e22;}
.rec-shop{background:#3498db;}
.rec-cafe{background:#8e44ad;}

.tube-marker{position:absolute;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.5);cursor:pointer;z-index:12;background:#E32017;transition:transform .15s;}
.tube-marker:hover{transform:scale(1.25);z-index:25;}
.tube-marker .mlabel{display:none;position:absolute;top:-28px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);color:#fff;padding:3px 8px;border-radius:4px;font-size:9px;white-space:nowrap;pointer-events:none;max-width:180px;text-align:center;}
.tube-marker:hover .mlabel{display:block;}
.toilet-marker{position:absolute;width:16px;height:16px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;border:1.5px solid rgba(255,255,255,.8);box-shadow:0 1px 3px rgba(0,0,0,.4);cursor:pointer;z-index:11;background:#27ae60;transition:transform .15s;}
.toilet-marker:hover{transform:scale(1.3);z-index:25;}
.toilet-marker.paid{background:#7f8c8d;}
.toilet-marker .mlabel{display:none;position:absolute;top:-26px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);color:#fff;padding:2px 7px;border-radius:4px;font-size:8px;white-space:nowrap;pointer-events:none;}
.toilet-marker:hover .mlabel{display:block;}

.landmark-marker{position:absolute;width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px;border:2px solid rgba(255,255,255,.85);box-shadow:0 1px 5px rgba(0,0,0,.5);cursor:pointer;z-index:13;background:rgba(142,68,173,.85);transition:transform .15s;}
.landmark-marker:hover{transform:scale(1.3);z-index:25;}
.landmark-marker .mlabel{display:none;position:absolute;top:-30px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.92);color:#fff;padding:4px 10px;border-radius:5px;font-size:9px;white-space:nowrap;pointer-events:none;max-width:200px;text-align:center;line-height:1.4;}
.landmark-marker:hover .mlabel{display:block;}
.mobile-toggle{display:none;position:fixed;top:12px;left:12px;z-index:150;background:var(--card);border:1px solid var(--border);border-radius:10px;width:40px;height:40px;align-items:center;justify-content:center;color:var(--text);cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.4);}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:190;opacity:0;transition:opacity .3s;}
@media(max-width:768px){
  #sidebar{position:fixed;left:0;top:0;width:85vw;max-width:360px;transform:translateX(-100%);transition:transform .3s ease;z-index:200;box-shadow:4px 0 20px rgba(0,0,0,.5);}
  #sidebar.open{transform:translateX(0);}
  #mapBox,#mapWrap{width:100% !important;}
  .mobile-toggle{display:flex !important;}
  .sidebar-overlay{display:block !important;}
  .sidebar-overlay.active{display:block !important;opacity:1;}
  #spotDetail{width:calc(100vw - 32px);max-width:340px;right:16px;}
}
</style>
</head>
<body>
<button class="mobile-toggle" onclick="document.getElementById('sidebar').classList.toggle('open');document.getElementById('sidebarOverlay').classList.toggle('active');">
  <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</button>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="document.getElementById('sidebar').classList.remove('open');this.classList.remove('active');"></div>
<div id="sidebar">
  <div class="sidebar-header">
    <h1>🗺️ 伦敦六日行程</h1>
    <p>约克→伦敦 · 8.12-16 康莱德 · 8.16-18 香格里拉 · 8.18-21 美居</p>
  </div>
  <div class="day-tabs" id="dayTabs"></div>
  <div class="day-content" id="dayContent"></div>
</div>
<div id="mapBox">
  <img id="mapImg" src="assets/london_map.png?v=3" alt="London Map" draggable="false">
  <canvas id="mapCanvas"></canvas>
  <div id="mapTooltip"></div>
  <div class="map-ctrl">
    <button id="zoomIn" title="放大"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
    <button id="zoomOut" title="缩小"><svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
    <button id="zoomReset" title="重置视图"><svg viewBox="0 0 24 24"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></button>
  </div>
  <div class="legend-bar" id="legendBar"></div>
  <div id="spotDetail">
    <div class="sp-detail-header">
      <button class="sp-close" onclick="closeSpotDetail()">✕</button>
      <span class="sp-tag" id="spTag">景点</span>
      <div class="sp-title" id="spTitle">景点名称</div>
      <div class="sp-meta">
        <span id="spTime">时间</span>
        <span id="spTransport">交通</span>
      </div>
    </div>
    <div class="sp-detail-body" id="spBody"></div>
  </div>
</div>

  {name:'Balthazar',lat:51.5125,lng:-0.1225,type:'餐饮',area:'Covent Garden',desc:'模仿巴黎经典brasserie风格，高天花板、镜面墙壁。推荐：法式洋葱汤(9镑)、海鲜拼盘(35镑/2人)、烤鸡配薯条(22镑)、牛排薯条(26镑)。面包篮免费，牛角面包很正宗。全天营业。人均30-40镑',color:'#e67e22'},
  {name:'Hide',lat:51.5065,lng:-0.1490,type:'餐饮',area:'Mayfair',desc:'米其林一星主厨Ollie Dabbous的三层概念餐厅。Ground floor是Wine Bar(人均25-35镑)，1st floor是Fine Dining(tasting menu 135镑/7道)。推荐：烤扇贝配柑橘酱(22镑)、鹿肉配栗子(32镑)。葡萄酒单超1500款。需提前2-4周预订。人均正餐60-100镑',color:'#e67e22'},
  {name:'Sketch',lat:51.5120,lng:-0.1435,type:'餐饮',area:'Mayfair',desc:'米其林三星主厨Pierre Gagnaire主理，整栋楼分5个风格区域。最出名的是The Gallery粉色丝绒墙的下午茶(55镑/人)和Lecture Room的tasting menu(185镑/14道)。太空蛋造型卫生间被评为伦敦必去。推荐：Celtic bouillon汤、龙虾意面。需提前预约。人均下午茶55-70镑，正餐80-200镑',color:'#e67e22'},

  {name:'The Goring',lat:51.4995,lng:-0.1470,type:'餐饮',area:'Victoria',desc:'百年豪华酒店餐厅，凯特王妃婚前单身派对举办地。英式下午茶(55镑/人)是招牌：三层架包括手指三明治、司康配凝脂奶油和果酱、精致小蛋糕。晚餐推荐：惠灵顿牛排(42镑)、烤鲈鱼配藏红花汁(32镑)。需提前预订。人均下午茶55-65镑，晚餐60-90镑',color:'#e67e22'},

const LANDMARKS=[
  {name:'圣潘克拉斯老教堂',lat:51.5305,lng:-0.1240,era:'11世纪',desc:'始建于1050年，是伦敦最古老的教堂之一。乔治王子（后乔治四世）和布拉德·皮特/安吉丽娜·朱莉的电影《沉睡魔咒》均在此取景。内有一个清幽的花园墓地，葬有玛丽·雪莱的母亲玛丽·沃斯通克拉夫特。'},
  {name:'圣潘克拉斯万丽酒店',lat:51.5322,lng:-0.1265,era:'1873年',desc:'维多利亚哥特复兴式建筑杰作，原为米德兰大饭店，拥有当时世界上最长的酒吧（33米）。酒店正门的尖塔高达82米，是伦敦天际线标志之一。电影《哈利·波特》中第9¾站台场景在此拍摄。'},
  {name:'英国图书馆',lat:51.5298,lng:-0.1260,era:'1998年',desc:'大英图书馆是世界上最大学术图书馆之一，藏有超过1.5亿件藏品。珍贵的展品包括：达芬奇手稿、莎士比亚第一对开本、甲壳虫乐队手写歌词、古登堡圣经等。国王图书馆塔楼高达65米，收藏乔治三世的6.5万册藏书。'},
  {name:'圣马丁教堂',lat:51.5085,lng:-0.1245,era:'1726年',desc:'詹姆斯·吉布斯设计的经典巴洛克教堂，其尖顶造型深刻影响了美国早期教堂建筑（如纽约三一教堂）。教堂前的广场是特拉法加广场的一部分。历史上，这里曾多次举办皇家婚礼和纪念仪式。'},
  {name:'海军部拱门',lat:51.5038,lng:-0.1280,era:'1912年',desc:'爱德华时代巴洛克风格，由建筑师阿斯顿·韦伯设计，原为英国海军部总部入口。2012年翻修后成为豪华酒店和餐厅。拱门中央通道曾是皇家仪仗队的必经之路。'},
  {name:'唐宁街10号',lat:51.5034,lng:-0.1277,era:'1682年',desc:'英国首相官邸，乔治·唐宁爵士于1682年建造。白色大门上的"10"号标志是全球最著名的门牌号之一。虽然不对外开放参观，但可以从外部Whitehall街上远远看到警卫和标志性的黑色铁门。'},
  {name:'克拉伦斯宫',lat:51.5003,lng:-0.1420,era:'1825-1827年',desc:'紧邻圣詹姆斯宫的皇室宫殿，由约翰·纳什为威廉四世设计。现为查尔斯国王在伦敦的官邸，外墙常悬挂王室旗帜。建筑风格为新古典主义，白色灰泥立面非常优雅。'},
  {name:'圣詹姆斯宫',lat:51.5025,lng:-0.1365,era:'1531年',desc:'亨利八世下令建造的都铎王朝宫殿，是伦敦最古老的宫殿之一。虽然君主早已不住在此，但这里仍是英国宫廷的正式总部，外国大使在此递交国书。禁卫军换岗仪式在此举行。'},
  {name:'皇家骑兵卫队',lat:51.5028,lng:-0.1330,era:'1753年',desc:'白厅街上的标志性建筑，红砂岩石柱廊和骑士雕像。每天11:00举行卫兵换岗仪式（周日10:00），免费观看，比白金汉宫换岗人少且距离更近。'},
  {name:'圣詹姆斯公园',lat:51.5025,lng:-0.1355,era:'1603年',desc:'伦敦最古老的皇家公园，由亨利八世猎鹿场改建。公园中有鹈鹕湖，湖中的鹈鹕是1662年俄罗斯大使赠予查理二世的。从公园的蓝桥上可以同时看到白金汉宫和伦敦眼。'},
  {name:'克里夫顿花园',lat:51.5102,lng:-0.1232,era:'1890年',desc:'考文特花园区域最美丽的鲜花市场，周日鲜花开市时五彩缤纷。周围是19世纪的红砖建筑和小巷，非常适合拍照。电影《诺丁山》中男主的书店就在附近的Portobello Road。'},
  {name:'萨默塞特宫',lat:51.5085,lng:-0.1165,era:'1776-1801年',desc:'新古典主义建筑瑰宝，原为皇家学院所在地，现在是考陶尔德美术馆和Courtauld Gallery的所在地。冬天的溜冰场和喷泉广场是伦敦最佳冬日景观之一。'},
  {name:'小威尼斯',lat:51.5245,lng:-0.1505,era:'1810年代',desc:'摄政运河与帕丁顿支流的交汇处，因像威尼斯而得名。沿岸排列着色彩缤纷的窄船（narrowboat），可以乘坐水巴士前往伦敦动物园或卡姆登市场。'},
  {name:'谢里登广场',lat:51.5128,lng:-0.1380,era:'1813年',desc:'苏活区的中心广场，以剧作家理查德·谢里登命名。周围是乔治亚联排住宅，底楼改为精品咖啡馆和餐厅。这里也是伦敦最古老的圣诞市集举办地之一。'},
  {name:'干草市场',lat:51.5088,lng:-0.1330,era:'16世纪',desc:'伦敦最古老的街道之一，名字来源于干草市场。现在以剧院闻名，皇家剧院（Theatre Royal）建于1663年，是英国最古老的连续运营的剧院，是英国戏剧史的核心场所。'},
  {name:'克里波门绞刑场',lat:51.5140,lng:-0.1120,era:'1571-1783年',desc:'伦敦最臭名昭著的绞刑场，处决了超过1200名囚犯，包括最有名的盗贼杰克·谢泼德和乔纳森·怀尔德。如今这里是一个安静的广场，圆形的绿色草坪下方就是当年绞刑架的确切位置。'},
  {name:'里昂茶馆',lat:51.5143,lng:-0.1160,era:'1869年',desc:'伦敦最古老、最大的餐厅之一，1869年开业至今。维多利亚风格的内部装潢极为华丽：马赛克地板、彩绘天花板、铸铁柱廊。曾是银行业务员的食堂，现在是标志性文化餐厅。'},

  {name:'圣玛丽-勒-波教堂',lat:51.5137,lng:-0.0835,era:'1680-1687年',desc:'克里斯托弗·雷恩设计的教堂，是伦敦大火后重建的50座教堂之一。名字来源于拉丁语"圣玛丽在海边"。曾是莎士比亚和清教徒父亲做礼拜的教堂所在地。'},
  {name:'伦敦市政厅',lat:51.5058,lng:-0.0750,era:'2002年',desc:'诺曼·福斯特设计的现代建筑，球形玻璃体造型，是伦敦市政府所在地。虽然建筑本身很新，但所在的Southwark地区自罗马时代就是伦敦的重要部分。顶层的"伦敦之眼"观景廊免费开放。'},
  {name:'克里斯特教堂',lat:51.5136,lng:-0.1125,era:'1670-1687年',desc:'克里斯托弗·雷恩设计的教堂，位于纽盖特街。教堂庭院下埋葬着1666年伦敦大火的许多遇难者。这里的钟声每天晚上都会响起，提醒人们大火的开始时间。'},
  {name:'布朗普顿礼拜堂',lat:51.4955,lng:-0.1690,era:'1840年',desc:'维多利亚时代的华丽教堂，被认为是伦敦最精美的教堂之一。内部有彩色大理石柱和精美的马赛克装饰。南肯辛顿的标志性建筑，经常举办古典音乐会。'},
  {name:'阿尔伯特纪念碑',lat:51.5020,lng:-0.1760,era:'1876年',desc:'维多利亚女王为纪念亡夫阿尔伯特亲王建造的哥特式华丽纪念碑，高53.6米，是英国最壮观的公共纪念碑。四角代表四大洲的雕塑群，纪念碑顶部是镀金的阿尔伯特亲王雕像。'},
  {name:'肯辛顿宫',lat:51.5040,lng:-0.1870,era:'1605年',desc:'曾是威廉三世和玛丽二世到维多利亚女王的皇室住所。戴安娜王妃曾在此居住，现为威廉王子和凯特的官邸。部分对公众开放，可以参观维多利亚女王的童年房间和皇室礼服展。'},
  {name:'波多贝罗路拱廊',lat:51.5160,lng:-0.1970,era:'1880年代',desc:'维多利亚时代的铸铁拱廊市场，位于诺丁山波多贝罗路。曾经是售卖肉类和蔬菜的市场，现在是古董和手工制品的集中地。《诺丁山》电影中大量场景在此拍摄。'},
  // ===== 新增：步行路线上+酒店附近 =====
  // --- 康莱德酒店附近（圣詹姆斯区）---
  {name:'圣詹姆斯宫花园',lat:51.5030,lng:-0.1350,era:'1530年代',desc:'与圣詹姆斯宫同时建造的都铎式围墙花园，免费对公众开放。四季鲜花盛开，草坪修剪整齐。从花园可以直接看到克拉伦斯宫的外墙。当地上班族午休常来此散步，非常安静惬意，是伦敦市中心隐藏的绿洲。'},
  {name:'女王画廊',lat:51.5018,lng:-0.1405,era:'1843年改建',desc:'位于白金汉宫南侧，原为女王私人教堂。2002年改建为画廊，常年展出皇家收藏的绘画、素描、家具和装饰艺术品。展品定期更换，每季都有新主题。建筑本身是白色新古典主义风格，入口不大但内部展厅很宽敞。'},
  // --- Day 1：康莱德→特拉法加步行线 ---
  {name:'卡尔顿花园联排',lat:51.5045,lng:-0.1295,era:'1827-1832年',desc:'位于圣詹姆斯公园东南角的一排优雅联排住宅，由约翰·纳什设计。外立面统一使用白色灰泥和科林斯柱，是摄政时期建筑美学的经典范例。曾是多位贵族和首相的宅邸。现在是英国外交部和联邦事务部的办公地，外观可自由参观。'},
  {name:'外交与联邦事务部',lat:51.5050,lng:-0.1280,era:'1868年',desc:'维多利亚哥特风格的政府建筑，位于白厅街。正面有精心雕刻的石柱和浮雕装饰，描绘了世界各地的人物形象。建筑内部有华丽的彩色马赛克走廊。曾出现在多部电影中，包括007系列。'},
  // --- Day 1：特拉法加→皮卡迪利→大本钟步行线 ---
  {name:'谢里登雕像与喷泉',lat:51.5095,lng:-0.1305,era:'1863年',desc:'位于皮卡迪利广场中心的爱神厄洛斯（Eros）青铜雕像，由阿尔弗雷德·吉尔伯特设计。实际纪念的是第七代沙夫茨伯里伯爵的慈善事业。脚下的喷泉基座装饰精美。这是伦敦最被拍照的雕像之一，夜晚灯光尤其迷人。'},
  {name:'Criterion Theatre',lat:51.5098,lng:-0.1340,era:'1874年',desc:'位于皮卡迪利广场入口的维多利亚剧院，外立面是华丽的巴洛克风格，内部装饰极尽奢华：马赛克地板、彩色玻璃穹顶和镀金装饰。每晚上演话剧和音乐剧，是伦敦西区最古老仍在运营的剧院之一。'},
  {name:'Waterloo Place',lat:51.5065,lng:-0.1305,era:'1815年',desc:'纪念1815年滑铁卢战役胜利而命名的广场。两侧矗立着巨大的阶梯式石柱廊。中央有多座将军和将领的青铜雕像。广场连接白厅街和特拉法加广场，是电影中常见的伦敦取景地。'},
  // --- Day 1：大本钟→Westminster Pier步行线 ---
  {name:'丘吉尔战争内阁',lat:51.4998,lng:-0.1245,era:'1939年',desc:'位于国会大厦地下的地下掩体，是二战期间丘吉尔和战时内阁的指挥中心。1940-1945年间在此召开了115次内阁会议。房间保持原样：手写的作战地图、丘吉尔的雪茄和椅子。需提前预订。门票约29镑。'},
  // --- Day 2：康莱德→威斯敏斯特教堂步行线 ---
  {name:'Catherine Yard',lat:51.4990,lng:-0.1315,era:'17世纪',desc:'康莱德酒店旁的隐秘庭院，从Catherine Street进入。17世纪的砖墙和鹅卵石步道保留至今，周围是乔治亚风格的联排住宅。这里远离游客喧嚣，是体验伦敦老城区氛围的绝佳去处。电影《王牌特工》在此取景。'},
  // --- Day 2：国家美术馆区域 ---
  {name:'特拉法加广场第四基座',lat:51.5078,lng:-0.1280,era:'1841年/1999年',desc:'特拉法加广场西北角的一个空基座，最初计划放威廉四世骑马雕像但从未完成。1999年起开始用于展示当代艺术装置，每件展品通常展示12-18个月。是目前伦敦最具话题性的公共艺术空间。'},
  // --- Day 4：康莱德→考文特花园步行线 ---
  {name:'皇家歌剧院',lat:51.5125,lng:-0.1245,era:'1858年重建',desc:'考文特花园的标志性建筑，英国皇家芭蕾舞团和皇家歌剧院的所在地。1858年由巴里设计重建，门廊的四根科林斯石柱非常壮观。即使不看演出，建筑外观和内部大厅也值得一看。大堂经常有免费展览和表演预览。'},
  // --- Day 3：白金汉宫→牛津街步行线 ---
  {name:'Apsley House',lat:51.5025,lng:-0.1520,era:'1821-1827年',desc:'威灵顿公爵的故居，被称为"伦敦一号"（No.1 London），因为它是皮卡迪利街最南端的第一栋宅邸。内部保留了大量威灵顿公爵的私人收藏：委拉斯开兹的画作、银器和瓷器。铁公爵的靴子和死亡面具也在此展出。门票约13镑。'},
  {name:'惠灵顿拱门',lat:51.5022,lng:-0.1525,era:'1825-1828年',desc:'原名"宪法拱门"或"绿公园拱门"，为纪念威灵顿公爵滑铁卢战役胜利而建。顶部有欧洲最大的青铜雕塑——驾车的和平天使。拱门内部现在是一个展览空间。从拱门顶部的观景台可以俯瞰白金汉宫花园和伦敦西端。'},
  // --- Day 3：牛津街→邦德街→大英博物馆步行线 ---
  {name:'伦敦博物馆',lat:51.5185,lng:-0.1275,era:'2017年新馆',desc:'伦敦博物馆从巴比肯区迁至Smithfield市场旁的新馆。讲述伦敦从史前到现代的城市故事。展出包括伦敦大火的遗物、维多利亚时代的街道场景重建、以及2012年奥运会的展品。免费参观（特展另费）。'},
  {name:'大英图书馆庭院',lat:51.5195,lng:-0.1270,era:'1998年',desc:'大英图书馆主楼前的广场，中央有一个巨大的方形玻璃天窗，可以看到下方楼层。广场上经常举办免费户外展览和文化活动。周围的台阶是拍摄图书馆外景的好角度。'},
  // --- Day 5：V&A→肯辛顿花园→诺丁山 ---
  {name:'自然历史博物馆外恐龙雕塑',lat:51.4960,lng:-0.1760,era:'1900年代',desc:'自然历史博物馆正门两侧的砂岩雕塑，描绘了多种已灭绝的生物。东侧外墙有一尊巨大的翼龙雕塑。这些雕塑本身已有100多年历史，是伦敦最被忽视的公共艺术品之一。'},
  {name:'皇家阿尔伯特音乐厅',lat:51.5012,lng:-0.1778,era:'1871年',desc:'为纪念阿尔伯特亲王而建，是英国最著名的音乐厅。椭圆形的红色砖墙和圆形玻璃穹顶可容纳5500名观众。每年举办超过350场演出，从古典音乐到摇滚演唱会。内部装饰极为华丽：马赛克拱廊和管风琴。'},
  {name:'科学与博物馆',lat:51.4975,lng:-0.1742,era:'1857年',desc:'与自然历史博物馆和V&A并称"南肯辛顿博物馆三件套"。建筑本身就是艺术——铁框玻璃结构是维多利亚工程的杰作。内部展出航空航天、蒸汽机、计算机发展史等科技展品。亮点包括：瓦特蒸汽机原件、阿波罗10号指令舱、斯蒂芬森的火箭号机车。免费参观。'},
  {name:'海德公园角',lat:51.5028,lng:-0.1538,era:'1828年',desc:'海德公园的东南入口，以巨大的拱门为标志。这里有一组乔治·坎宁、罗德尼海军上将等人的雕像。从入口处可以望到海德公园绵延的绿色草坪和远处的肯辛顿花园。是伦敦最大皇家公园的起点。'},
  // --- Day 6：碎片→伦敦塔→圣保罗→塔桥 ---
  {name:'伦敦桥石碑',lat:51.5058,lng:-0.0885,era:'2003年',desc:'伦敦桥南岸的现代公寓和办公综合体，玻璃建筑反映了泰晤士河的美景。这里原是古代罗马伦敦的桥头堡所在地，地下曾发现罗马时期的遗迹。现代的观景平台可看到碎片大厦和伦敦塔桥。'},
  {name:'圣保罗教堂墓地',lat:51.5135,lng:-0.1005,era:'17世纪',desc:'位于圣保罗大教堂北侧的墓地花园，是伦敦大火后雷恩重建教堂规划的一部分。周围有乔治亚风格的建筑和鹅卵石小巷。著名建筑师克里斯托弗·雷恩本人的墓也在此区域内。'},
  {name:'千禧桥南端',lat:51.5075,lng:-0.1000,era:'2000年',desc:'连接圣保罗大教堂和泰特现代美术馆的行人天桥，由诺曼·福斯特设计。桥面极窄，没有车辆，是拍摄圣保罗大教堂正面全景的最佳位置。桥上的银色护栏和红色桥面非常上镜。'},
  // --- 碎片大厦附近 ---
  {name:'博罗市场',lat:51.5055,lng:-0.0905,era:'11世纪/19世纪',desc:'伦敦最古老、最有名的食品市场，历史可追溯至11世纪。维多利亚时代的铁艺顶棚下有100多个摊位。周一-周三以普通食品为主，周四-周五增加美食摊位，周六最热闹（古董+美食）。推荐：苏格兰蛋、手工奶酪、新鲜生蚝。'},

const DAYS = [
  {date:'8.12',wd:'三',label:'Day 1',title:'约克 → 伦敦',color:'#e74c3c',
   subtitle:'约克→火车→酒店放行李→伦敦核心→泰晤士游船→伦敦塔→(两条路线回)→伦敦眼',
   spots:[
    {name:'约克大教堂',time:'9:30',lat:53.9627,lng:-1.0825,desc:'欧洲最大哥特式教堂之一，彩色玻璃窗极为壮观',detail:'<div class="sp-section"><h4>历史</h4><p>约克大教堂（York Minster）始建于1220年，历时250年建成，是英国最大的哥特式大教堂，也是北欧最大的中世纪教堂。教堂拥有世界上面积最大的中世纪彩色玻璃窗，总面积超过2,000平方米。</p></div><div class="sp-section"><h4>必看亮点</h4><ul><li>大东窗（Great East Window）：世界上最大的中世纪彩色玻璃，描绘了圣经《启示录》场景</li><li>玫瑰窗（Rose Window）：位于南耳堂，直径16英尺，以红白玫瑰象征兰卡斯特与约克家族的和解</li><li>中央塔：可攀登275级台阶至塔顶，俯瞰约克全城</li><li>地下宝库（Undercroft）：展示罗马、维京和中世纪遗迹</li></ul></div><div class="sp-section"><h4>实用信息</h4><p>门票约16英镑，含中央塔攀登另付6英镑。建议预留1.5-2小时。晨间光线透过彩色玻璃效果最佳。</p></div>',tag:'教堂',york:true,transport:''},
    {name:'博物馆花园',time:'10:30',lat:53.9595,lng:-1.0870,desc:'约克修道院遗址和美丽花园',detail:'<div class="sp-section"><h4>历史</h4><p>博物馆花园位于约克修道院（St Mary\'s Abbey）遗址之上，这座本笃会修道院始建于1088年，曾是英格兰北部最富有的修道院之一，在亨利八世解散修道院时（1539年）被毁。</p></div><div class="sp-section"><h4>必看亮点</h4><ul><li>修道院遗址残墙：仍可看出昔日规模宏大</li><li>圣伦纳德医院遗址（St Leonard\'s Hospital）</li><li>罗马堡垒城墙</li><li>约克郡博物馆：收藏丰富的地方历史文物</li></ul></div><div class="sp-section"><h4>实用信息</h4><p>花园免费开放。约克郡博物馆门票约8英镑。建议预留45分钟-1小时。</p></div>',tag:'公园',york:true,transport:'步行 400m · 5min'},
    {name:'🚂 约克→伦敦火车',time:'11:30',lat:53.9590,lng:-1.0820,desc:'约克→King\'s Cross，约2小时',tag:'交通',transfer:true,york:true,transport:'步行 350m · 4min'},
    {name:'King\'s Cross',time:'13:30',lat:51.5322,lng:-0.1270,desc:'到达伦敦',detail:'<div class="sp-section"><h4>历史</h4><p>国王十字车站（King\'s Cross Station）建于1852年，是伦敦最重要的铁路枢纽之一，连接英格兰北部和苏格兰。车站以乔治四世国王命名，旁边还有圣潘克拉斯国际火车站。</p></div><div class="sp-section"><h4>必看亮点</h4><ul><li>9¾站台：哈利·波特粉丝必打卡，车站内设有推车穿越墙壁的拍照装置</li><li>新古典主义穹顶：2012年翻新后的大厅拥有壮观的波浪形屋顶</li><li>周边区域：国王十字近年来改造为伦敦科技创业中心</li></ul></div><div class="sp-section"><h4>实用信息</h4><p>无需门票。从站台到地铁 Piccadilly 线步行约3分钟。</p></div>',tag:'交通',transport:'',routeKey:''},
    {name:'🏨 康莱德酒店放行李',time:'14:00',lat:51.4995,lng:-0.1335,desc:'先回酒店放下行李，轻装出行',tag:'酒店',transfer:true,mapHide:true,transport:'地铁 Piccadilly线 4站 · 12min',routeKey:'kingscross_conrad'},
    {name:'特拉法加广场',time:'14:30',lat:51.5080,lng:-0.1281,desc:'纳尔逊纪念柱和国家美术馆',detail:'<div class="sp-section"><h4>历史</h4><p>特拉法加广场建于1830-1840年代，纪念1805年特拉法加海战中击败拿破仑舰队的纳尔逊上将。广场中央高52米的纳尔逊纪念柱于1843年落成。</p></div><div class="sp-section"><h4>必看亮点</h4><ul><li>纳尔逊纪念柱：柱顶是纳尔逊上将铜像，柱基有四座青铜狮子雕塑</li><li>国家美术馆（北侧）：免费入场，收藏2300多幅西方绘画名作</li><li>喷泉：广场两侧各有一座大型喷泉</li><li>第四基座：不定期轮换当代艺术装置</li></ul></div><div class="sp-section"><h4>实用信息</h4><p>广场免费开放，24小时可进入。喂鸽子已被禁止。国家美术馆周一闭馆（周五延长开放至21:00）。</p></div>',tag:'地标',transport:'步行 900m · 11min',routeKey:'conrad_trafalgar'},
    {name:'皮卡迪利广场',time:'15:00',lat:51.5101,lng:-0.1339,desc:'伦敦最繁华路口',detail:'<div class="sp-section"><h4>历史</h4><p>皮卡迪利广场（Piccadilly Circus）建于1819年，是伦敦最繁华的路口，以巨大的LED广告屏闻名，被誉为"伦敦的时代广场"。广场中央有爱神厄洛斯雕像（1893年）。</p></div><div class="sp-section"><h4>必看亮点</h4><ul><li>LED广告屏：数十块巨型屏幕日夜闪烁，是伦敦标志性景观</li><li>厄洛斯雕像：纪念第七代沙夫茨伯里伯爵的慈善工作</li><li>周边区域：莱斯特广场（电影院集中地）、苏活区（餐厅酒吧）</li><li>摄政街拱门：向北延伸至牛津圆环</li></ul></div><div class="sp-section"><h4>实用信息</h4><p>免费开放。夜晚灯光效果最佳。附近有众多剧院，可提前查当晚演出。</p></div>',tag:'地标',transport:'步行 350m · 4min',routeKey:'trafalgar_piccadilly'},
    {name:'大本钟/国会大厦',time:'15:30',lat:51.5007,lng:-0.1246,desc:'泰晤士河畔标志性钟楼',detail:'<div class="sp-section"><h4>历史</h4><p>大本钟（Big Ben）其实是钟的名字，钟楼名为伊丽莎白塔（2012年更名），建于1859年，高96米。威斯敏斯特宫（国会大厦）始建于11世纪，现存建筑为1834年大火后重建，是新哥特式建筑杰作。</p></div><div class="sp-section"><h4>必看亮点</h4><ul><li>伊丽莎白塔：钟重13.7吨，每15分钟报时一次</li><li>威斯敏斯特桥：泰晤士河上拍摄大本钟的最佳角度</li><li>议会广场：环绕着丘吉尔、甘地等政治家雕像</li><li>泰晤士河南岸步道：傍晚拍摄大本钟倒影的绝佳位置</li></ul></div><div class="sp-section"><h4>实用信息</h4><p>钟楼目前不对外开放参观。国会大厦 debate 时段可在网上免费预约旁听。建议傍晚6-7点来，亮灯后非常壮观。</p></div>',tag:'地标',transport:'步行 1.0km · 12min',routeKey:'piccadilly_bigben'},
    {name:'🚢 泰晤士河游船(去程)',time:'16:00',lat:51.5025,lng:-0.1239,desc:'Westminster Pier → Tower Pier，沿岸看伦敦眼、圣保罗',tag:'游船',transfer:true,transport:'步行 250m · 3min',routeKey:'bigben_westminsterpier'},
    {name:'伦敦塔',time:'16:45',lat:51.5081,lng:-0.0759,desc:'千年古堡，皇室珠宝',detail:'<div class="sp-section"><h4>历史</h4><p>伦敦塔（Tower of London）由征服者威廉于1078年开始建造，最初是诺曼征服者的堡垒，后成为皇宫、监狱、军械库、铸币厂、动物园和皇家宝库。这里关押过安妮·博林、沃尔特·雷利等著名囚徒。</p></div><div class="sp-section"><h4>必看亮点</h4><ul><li>皇冠珠宝（Crown Jewels）：英国君主加冕用的圣爱德华皇冠、权杖等，包含530克拉的非洲之星钻石</li><li>白塔（White Tower）：诺曼时期的核心建筑，内藏皇家军械库</li><li>渡鸦（Ravens）：传说如果6只渡鸦离开，伦敦塔和王冠都将倒塌</li><li>约曼守卫（Yeoman Warders / Beefeaters）：免费导览，幽默生动的历史讲解</li></ul></div><div class="sp-section"><h4>实用信息</h4><p>门票约30英镑（建议网上提前购买可省3英镑）。建议预留3小时。周二-周六 9:00-17:30，周日-周一 10:00-17:30。最后入场时间闭馆前1小时。</p></div>',tag:'历史',transport:'🚢 游船 · ~25min',routeKey:'boat_westminster_tower'},
    {name:'伦敦眼',time:'19:30',lat:51.5033,lng:-0.1196,desc:'南岸地标摩天轮，夜景绝佳',detail:'<div class="sp-section"><h4>历史</h4><p>伦敦眼（London Eye）建于1999年，为庆祝千禧年而造，当时是世界最高的摩天轮（135米）。如今仍是欧洲最高的悬臂式观景轮，每年接待超过350万游客。</p></div><div class="sp-section"><h4>必看亮点</h4><ul><li>360°全景：天气好时可见40公里远，包括温莎城堡</li><li>胶囊舱：32个舱代表伦敦32个自治区，每舱可容纳25人</li><li>一圈约30分钟：升至最高点时俯瞰泰晤士河全景</li><li>日落时分：金色光线下的伦敦天际线最为壮丽</li></ul></div><div class="sp-section"><h4>实用信息</h4><p>标准票约30英镑，快速通道约40英镑。强烈建议提前网上购票。每日开放时间因季节而异，通常10:00-20:30。日落前30分钟上舱最佳。</p></div>',tag:'景点',transport:'【方案A】🚢游船返回+步行过桥 ~35min 或 【方案B】🚇地铁Circle线 ~20min',routeKey:'tube_tower_londoneye'},

  {date:'8.13',wd:'四',label:'Day 2',title:'西敏+美术馆+自然史',color:'#3498db',
   subtitle:'威斯敏斯特教堂→国家美术馆→自然历史博物馆(绿→红→蓝区)',
   spots:[
    {name:'威斯敏斯特教堂',time:'9:30',lat:51.4994,lng:-0.1273,desc:'英国君主加冕与安葬地',detail:'<div class="sp-section"><h4>历史</h4><p>威斯敏斯特教堂（Westminster Abbey）始建于960年，现存建筑为13世纪亨利三世重建。自1066年威廉一世以来，几乎所有英国君主的加冕典礼都在此举行。17位君主安葬于此，包括伊丽莎白一世和玛丽一世。</p></div><div class="sp-section"><h4>必看亮点</h4><ul><li>诗人角（Poets\' Corner）：乔叟、狄更斯、哈代等文学巨匠纪念地</li><li>加冕椅（Coronation Chair）：1300年制造，历代君主加冕时坐的椅子</li><li>皇家陵墓：亨利七世礼拜堂是晚期哥特式建筑巅峰之作</li><li>无名战士墓：一战阵亡将士，1920年安葬，墓前永远有鲜花</li></ul></div><div class="sp-section"><h4>实用信息</h4><p>门票约27英镑。周一至周五 9:30-15:30（最后入场），周六 9:00-15:00。周日仅礼拜，不开放参观。建议预留1.5小时。</p></div>',tag:'教堂',transport:'步行 650m · 8min',routeKey:'conrad_westminsterabbey'},
    {name:'国家美术馆',time:'11:00',lat:51.5089,lng:-0.1283,desc:'梵高《向日葵》等名作',detail:'<div class="sp-section"><h4>历史</h4><p>国家美术馆（National Gallery）成立于1824年，收藏了从13世纪中期到1900年的西欧绘画杰作。免费对公众开放，是伦敦最受欢迎的美术馆之一，每年吸引超过600万访客。</p></div><div class="sp-section"><h4>必看亮点</h4><ul><li>梵高《向日葵》：43号厅，画家最著名的静物之一</li><li>达芬奇《岩间圣母》：66号厅，佛罗伦萨画派代表作</li><li>莫奈《睡莲》系列：印象派收藏</li><li>委拉斯开兹《镜前的维纳斯》：西方艺术中罕见的裸体作品</li><li>透纳海景：英国浪漫主义风景画</li></ul></div><div class="sp-section"><h4>实用信息</h4><p>免费开放。周五延长至21:00（其他日期18:00闭馆）。建议周五晚场避开白天人流。特展需单独购票。</p></div>',tag:'博物馆',transport:'步行 900m · 11min',routeKey:'westminsterabbey_nationalgallery'},
    {name:'自然历史博物馆',time:'15:00',lat:51.4967,lng:-0.1765,desc:'绿区(恐龙)→红区(地球/火山)→蓝区(动植物)',detail:'<div class="sp-section"><h4>历史</h4><p>自然历史博物馆（Natural History Museum）成立于1881年，原为不列颠博物馆的自然历史分部。建筑本身就是维多利亚时代的哥特复兴杰作，由阿尔弗雷德·沃特豪斯设计，使用蓝紫色瓷砖装饰。</p></div><div class="sp-section"><h4>必看亮点</h4><ul><li>蓝鲸骨架（Hintze Hall）：悬挂在大厅中央的蓝鲸标本，长25.2米</li><li>绿区（Green Zone）：恐龙展厅，包括机械暴龙和剑龙骨架</li><li>红区（Red Zone）：地球厅，模拟火山爆发和地震，展示稀有宝石</li><li>蓝区（Blue Zone）：哺乳动物、海洋生物、人类进化</li><li>达尔文中心：收藏超过2200万件标本的幕后仓库</li></ul></div><div class="sp-section"><h4>实用信息</h4><p>免费开放。17:50闭馆（最后入场17:30）。建议游览路线：绿区→红区→蓝区，约需2-3小时。</p></div>',tag:'博物馆',transport:'地铁 Piccadilly线 5站 · 15min',routeKey:'tube_nationalgallery_nhm'},
   ],

  {date:'8.14',wd:'五',label:'Day 3',title:'白金汉宫+购物+大英',color:'#2ecc71',
   subtitle:'白金汉宫→马车厅→牛津街/邦德街→晚场大英博物馆',
   spots:[
    {name:'白金汉宫',time:'9:30',lat:51.5014,lng:-0.1419,desc:'官方寝宫，卫兵换岗',detail:'<div class="sp-section"><h4>历史</h4><p>白金汉宫（Buckingham Palace）自1837年维多利亚女王即位以来一直是英国君主的官方寝宫。建筑最初是1703年白金汉公爵的私人住宅，1761年被乔治三世购为女王居所，后经多次扩建成为现在的规模。</p></div><div class="sp-section"><h4>必看亮点</h4><ul><li>卫兵换岗仪式：夏季每日（冬季隔日），约45分钟，乐队演奏</li><li>国事厅（State Rooms）：每年7-9月对外开放，19间华丽的国事厅</li><li>皇家马厩：展示皇家马车，包括用于加冕典礼的金色马车</li><li>维多利亚纪念碑：宫前广场中央的镀金雕像群</li></ul></div><div class="sp-section"><h4>实用信息</h4><p>换岗仪式免费观看，建议9:15前到维多利亚纪念碑对面占位。国事厅门票约30英镑，需提前网上预订。卫兵换岗约10:45开始（具体时间可能变化，建议当天官网确认）。</p></div>',tag:'景点',transport:'步行 350m · 5min',routeKey:'conrad_buckingham'},
    {name:'皇家马厩/马车厅',time:'11:45',lat:51.5011,lng:-0.1428,desc:'皇家马车展示，金色马车',detail:'<div class="sp-section"><h4>历史</h4><p>皇家马厩（The Royal Mews）是白金汉宫的御马房和车库，负责管理君主的马车和马匹。这里收藏了英国皇室最珍贵的交通工具，包括加冕典礼使用的金色马车。</p></div><div class="sp-section"><h4>必看亮点</h4><ul><li>金色马车（Gold State Coach）：1762年制造，镀金车身，重达4吨，用于加冕典礼</li><li>皇家马匹：可以看到温莎灰马和克利夫兰湾马</li><li>钻石禧年马车：2014年为伊丽莎白二世制造，融合英国历史文物</li></ul></div><div class="sp-section"><h4>实用信息</h4><p>门票约14英镑，含在白金汉宫国事厅套票中。建议预留45分钟。</p></div>',tag:'景点',transport:'步行 100m · 2min',routeKey:''},
    {name:'🛍️ 牛津街',time:'13:00',lat:51.5153,lng:-0.1417,desc:'Selfridges等百货',detail:'<div class="sp-section"><h4>历史</h4><p>牛津街（Oxford Street）是英国最繁忙的购物街，长约1.9公里，拥有约300家商店。街道名称来源于牛津伯爵，18世纪开始发展为购物区。Selfridges百货建于1909年。</p></div><div class="sp-section"><h4>必看亮点</h4><ul><li>Selfridges：伦敦最奢华的百货公司之一，食品大厅尤其精彩</li><li>John Lewis：英国老牌百货，品质保证</li><li>Primark旗舰店：平价快时尚的欧洲最大门店之一</li></ul></div><div class="sp-section"><h4>实用信息</h4><p>商店通常10:00-20:00营业（周四延长至21:00或22:00）。步行全程约需25分钟。</p></div>',tag:'购物',transfer:true,transport:'步行 1.1km · 14min',routeKey:'buckingham_oxford'},
    {name:'🛍️ 邦德街',time:'14:30',lat:51.5134,lng:-0.1486,desc:'奢侈品旗舰店',detail:'<div class="sp-section"><h4>历史</h4><p>邦德街（Bond Street）以17世纪开发商托马斯·邦德爵士命名，自18世纪以来就是伦敦最昂贵的购物街之一。分为旧邦德街和新邦德街，汇聚全球最顶级的奢侈品牌旗舰店。</p></div><div class="sp-section"><h4>必看亮点</h4><ul><li>顶级品牌旗舰店：路易威登、香奈儿、爱马仕、卡地亚等</li><li>苏富比拍卖行：全球最著名的艺术品拍卖行</li><li>皇家艺术院：定期举办世界级艺术展览</li></ul></div><div class="sp-section"><h4>实用信息</h4><p>即使不购物，建筑橱窗也值得欣赏。步行约15分钟可走完整条街。</p></div>',tag:'购物',transport:'步行 500m · 6min',routeKey:'oxford_bond'},
    {name:'大英博物馆',time:'17:00',lat:51.5194,lng:-0.1270,desc:'周五晚场至20:30，罗塞塔石碑、帕特农雕塑',detail:'<div class="sp-section"><h4>历史</h4><p>大英博物馆（British Museum）成立于1753年，是世界上第一座国家公共博物馆，也是馆藏最丰富的博物馆之一。由汉斯·斯隆爵士的藏品奠基，现有超过800万件藏品，涵盖人类200万年历史。</p></div><div class="sp-section"><h4>必看亮点</h4><ul><li>罗塞塔石碑（4号厅）：解读古埃及象形文字的关键，公元前196年</li><li>帕特农雕塑/埃尔金大理石（18号厅）：古希腊艺术的巅峰</li><li>埃及木乃伊：62-63号厅，超过140具木乃伊</li><li>刘易斯棋子（40号厅）：12世纪挪威海象牙国际象棋</li><li>复活节岛摩艾石像：来自智利的巨大石像</li></ul></div><div class="sp-section"><h4>实用信息</h4><p>永久藏品免费开放。周五延长开放至20:30（其他日期17:00闭馆）。建议预留2-3小时。下载官方App有免费导览。周五晚场人少体验好。</p></div>',tag:'博物馆',transport:'步行 1.2km · 15min',routeKey:'bond_britishmuseum'},

  {date:'8.15',wd:'六',label:'Day 4',title:'考文特+哈罗德+美术馆',color:'#9b59b6',
   subtitle:'考文特花园→尼尔庭院→哈罗德百货→国家美术馆(预约16:30)',
   spots:[
    {name:'考文特花园',time:'9:30',lat:51.5128,lng:-0.1241,desc:'Apple Market、街头表演',detail:'<div class="sp-section"><h4>历史</h4><p>考文特花园（Covent Garden）原为威斯敏斯特修道院的果园，1630年代发展为伦敦第一个有屋顶的广场市场。如今是伦敦最著名的文化娱乐区之一，以街头表演、精品店和餐厅闻名。</p></div><div class="sp-section"><h4>必看亮点</h4><ul><li>Apple Market：周一至周六手工艺品市场，周日古董市场</li><li>街头表演：广场中央的持牌表演者，杂技、音乐、魔术</li><li>伦敦交通博物馆：展示伦敦公交和地铁历史</li><li>周边小巷：Floral Street、Bedford Street 等充满特色小店</li></ul></div><div class="sp-section"><h4>实用信息</h4><p>市场区域免费开放。伦敦交通博物馆门票约22英镑。建议上午去，人流较少。</p></div>',tag:'景点',transport:'步行 800m · 10min',routeKey:'conrad_coventgarden'},
    {name:'Neal\'s Yard',time:'10:30',lat:51.5120,lng:-0.1243,desc:'隐藏彩色小院，拍照打卡',detail:'<div class="sp-section"><h4>历史</h4><p>尼尔斯庭院（Neal\'s Yard）是考文特花园区域一处隐蔽的彩色小院子，以1970年代的另类文化和有机健康食品运动闻名。这里的建筑涂满了鲜艳的色彩，是伦敦 Instagram 上最火的拍照地之一。</p></div><div class="sp-section"><h4>必看亮点</h4><ul><li>彩色联排房屋：每栋建筑都是不同的鲜艳色彩</li><li>Neal\'s Yard Remedies：英国天然护肤品牌发源地</li><li>独立咖啡馆：多家有机素食餐厅</li></ul></div><div class="sp-section"><h4>实用信息</h4><p>免费进入。白天光线好时拍照效果最佳，建议上午10-11点。</p></div>',tag:'景点',transport:'步行 200m · 2min',routeKey:'coventgarden_nealsyard'},
    {name:'🛍️ 哈罗德百货',time:'12:00',lat:51.4996,lng:-0.1633,desc:'顶级百货，食品大厅',detail:'<div class="sp-section"><h4>历史</h4><p>哈罗德百货（Harrods）创立于1849年，由查尔斯·亨利·哈罗德在东伦敦开设。1898年被埃及商人穆罕默德·阿尔法耶德收购后扩建为现在的规模。百货内部装饰极尽奢华，使用超过1.2万块埃及风格瓷砖。</p></div><div class="sp-section"><h4>必看亮点</h4><ul><li>食品大厅（Food Halls）：世界最奢华的食品区，从松露到鱼子酱应有尽有</li><li>戴安娜王妃与多迪纪念：地下室有两人纪念堂</li><li>埃及风情装饰：扶梯旁的法老风格雕塑</li></ul></div><div class="sp-section"><h4>实用信息</h4><p>10:00-21:00营业（周日11:30-18:00）。即使不购物，食品大厅也值得一看。紧邻海德公园。</p></div>',tag:'购物',transport:'地铁 Piccadilly线 4站 · 10min',routeKey:'tube_nealsyard_harrods'},
    {name:'国家美术馆(预约)',time:'16:30',lat:51.5089,lng:-0.1283,desc:'预约16:30入场，18:00闭馆',tag:'博物馆',transport:'地铁 Piccadilly线 3站 · 8min',routeKey:'tube_harrods_nationalgallery'},

  {date:'8.16',wd:'日',label:'Day 5',title:'换岗+V&A+肯辛顿+诺丁山',color:'#f39c12',
   subtitle:'换岗仪式→V&A→退房→肯辛顿花园→诺丁山',
   spots:[
    {name:'换岗仪式',time:'10:00',lat:51.5014,lng:-0.1419,desc:'建议9:15前占位',tag:'活动',transport:'步行 350m · 5min',routeKey:'conrad_buckingham_change'},
    {name:'V&A博物馆',time:'11:30',lat:51.4967,lng:-0.1733,desc:'艺术与设计博物馆',detail:'<div class="sp-section"><h4>历史</h4><p>维多利亚与阿尔伯特博物馆（V&A）成立于1852年，以维多利亚女王和阿尔伯特亲王命名，是世界上最大的装饰艺术和设计博物馆。收藏超过230万件藏品，跨越5000年历史。</p></div><div class="sp-section"><h4>必看亮点</h4><ul><li>时尚画廊：从18世纪到当代的服装设计演变</li><li>珠宝展厅：欧洲最丰富的珠宝收藏之一</li><li>中东伊斯兰艺术：精美的地毯、陶瓷和金属工艺品</li><li>中世纪与文艺复兴：雕塑、挂毯和家具</li><li>陶瓷展厅：从明代瓷器到现代陶艺</li></ul></div><div class="sp-section"><h4>实用信息</h4><p>永久藏品免费开放。10:00-17:45（周五延长至22:00）。紧邻自然历史博物馆和科学博物馆，可一并安排。</p></div>',tag:'博物馆',transport:'步行 1.0km · 12min',routeKey:'buckingham_vamuseum'},
    {name:'🏨 退房(康莱德)',time:'14:00',lat:51.4995,lng:-0.1335,desc:'返回酒店取行李，办理退房',tag:'其他',transfer:true,transport:'步行 1.0km · 12min',routeKey:'vamuseum_conrad'},
    {name:'肯辛顿花园',time:'14:30',lat:51.5073,lng:-0.1786,desc:'皇家公园，彼得潘雕像',detail:'<div class="sp-section"><h4>历史</h4><p>肯辛顿花园（Kensington Gardens）原为肯辛顿宫的私人花园，1841年对公众开放。占地107公顷，与海德公园相邻但风格更正式，拥有精美的园艺设计和多处纪念雕塑。</p></div><div class="sp-section"><h4>必看亮点</h4><ul><li>彼得潘雕像：1912年安放，是J.M.巴里小说粉丝朝圣地</li><li>阿尔伯特纪念碑：维多利亚女王为纪念亡夫建造的哥特式华丽纪念碑</li><li>蛇形画廊：现代艺术展览空间</li><li>圆形池塘（Round Pond）：观赏水鸟和天鹅</li><li>肯辛顿宫：黛安娜王妃故居，部分对公众开放</li></ul></div><div class="sp-section"><h4>实用信息</h4><p>免费开放，6:00- dusk。建议预留1-1.5小时。从肯辛顿花园步行10分钟可到诺丁山。</p></div>',tag:'公园',transport:'步行 1.3km · 16min',routeKey:'conrad_kensingtongardens'},
    {name:'诺丁山',time:'16:00',lat:51.5122,lng:-0.1935,desc:'彩色联排房屋，波多贝罗市场',detail:'<div class="sp-section"><h4>历史</h4><p>诺丁山（Notting Hill）在20世纪50-60年代曾是伦敦的贫民窟，后来逐渐发展为伦敦最时尚、最多元文化的社区之一。1999年电影《诺丁山》让这里成为全球知名的浪漫地标。</p></div><div class="sp-section"><h4>必看亮点</h4><ul><li>彩色联排房屋：特别是 Lancaster Road、Portobello Road 沿线</li><li>波多贝罗市场（Portobello Market）：周五周六最热闹，古董、美食、复古服饰</li><li>电影《诺丁山》取景地：Travel Book Shop（现为 Notting Hill Bookshop）</li><li>蓝门：电影中休·格兰特居住的标志性蓝色门</li></ul></div><div class="sp-section"><h4>实用信息</h4><p>免费开放。波多贝罗市场周六最热闹（8:00-18:30）。下午4点后摊主开始收摊，可低价捡漏。色彩房屋拍照建议上午光线好时。</p></div>',tag:'景点',transport:'步行 1.0km · 12min',routeKey:'kensingtongardens_nottinghill'},

   returnTransport:'地铁 · ~25min',hotelKey:'shangrila',checkoutKey:'conrad'

  {date:'8.17',wd:'一',label:'Day 6',title:'伦敦塔+圣保罗+塔桥+碎片',color:'#1abc9c',
   subtitle:'伦敦塔→圣保罗大教堂→塔桥(看开桥)→碎片大厦',
   spots:[
    {name:'伦敦塔',time:'9:30',lat:51.5081,lng:-0.0759,desc:'皇冠珠宝和白塔',detail:'<div class="sp-section"><h4>历史</h4><p>伦敦塔（Tower of London）由征服者威廉于1078年开始建造，最初是诺曼征服者的堡垒，后成为皇宫、监狱、军械库、铸币厂、动物园和皇家宝库。这里关押过安妮·博林、沃尔特·雷利等著名囚徒。</p></div><div class="sp-section"><h4>必看亮点</h4><ul><li>皇冠珠宝（Crown Jewels）：英国君主加冕用的圣爱德华皇冠、权杖等，包含530克拉的非洲之星钻石</li><li>白塔（White Tower）：诺曼时期的核心建筑，内藏皇家军械库</li><li>渡鸦（Ravens）：传说如果6只渡鸦离开，伦敦塔和王冠都将倒塌</li><li>约曼守卫（Yeoman Warders / Beefeaters）：免费导览，幽默生动的历史讲解</li></ul></div><div class="sp-section"><h4>实用信息</h4><p>门票约30英镑（建议网上提前购买可省3英镑）。建议预留3小时。周二-周六 9:00-17:30，周日-周一 10:00-17:30。最后入场时间闭馆前1小时。</p></div>',tag:'历史',transport:'步行 350m · 4min',routeKey:'shard_tower'},
    {name:'圣保罗大教堂',time:'11:30',lat:51.5138,lng:-0.0984,desc:'穹顶登顶俯瞰，528级台阶',detail:'<div class="sp-section"><h4>历史</h4><p>圣保罗大教堂（St Paul\'s Cathedral）由克里斯托弗·雷恩爵士设计，建于1675-1710年，替代在1666年伦敦大火中毁灭的旧教堂。它是英国巴洛克建筑的巅峰之作，穹顶高111米，曾是伦敦最高建筑长达250年。</p></div><div class="sp-section"><h4>必看亮点</h4><ul><li>穹顶登顶：528级台阶至金回廊（Golden Gallery），俯瞰伦敦360°全景</li><li>耳语廊（Whispering Gallery）：穹顶内侧环形回廊，对着墙壁低语，对面的人能听到</li><li>地下墓室：纳尔逊上将、威灵顿公爵等英国名将安葬于此</li><li>美国纪念礼拜堂：纪念二战中阵亡的美国军人</li></ul></div><div class="sp-section"><h4>实用信息</h4><p>门票约23英镑。周一至周六 8:30-16:30（最后入场），周日礼拜不开放参观。登顶需要体力，建议预留2小时。摄影仅限教堂外部。</p></div>',tag:'教堂',transport:'步行(过塔桥) 1.3km · 16min',routeKey:'tower_stpauls'},
    {name:'伦敦塔桥',time:'14:00',lat:51.5055,lng:-0.0754,desc:'玻璃走廊，注意开桥时刻',detail:'<div class="sp-section"><h4>历史</h4><p>伦敦塔桥（Tower Bridge）建于1886-1894年，是维多利亚时代工程奇迹。桥身可开启让大型船只通过泰晤士河。采用新哥特式风格设计，与附近的伦敦塔风格呼应。2016年玻璃走廊开放，走在桥上可直接看到脚下40米处的河水。</p></div><div class="sp-section"><h4>必看亮点</h4><ul><li>玻璃走廊：高42米的悬索桥上铺设玻璃地板，俯瞰桥下车流和河面</li><li>引擎室：维多利亚时代的液压升降机械，至今仍在运作</li><li>开桥时刻：大型船只通过时桥面升起（官网可查时刻表）</li><li>展览：了解桥梁建造历史和工程师的奋斗故事</li></ul></div><div class="sp-section"><h4>实用信息</h4><p>门票约12英镑（不上展览可免费过桥）。开桥时刻通常在夏季下午，大型船只通过前15分钟公布。建议下午14:00左右碰运气。</p></div>',tag:'地标',transport:'步行(过塔桥) 1.3km · 16min',routeKey:'stpauls_towerbridge'},

function getHotel(key){ return HOTELS[key]; }
function getHotelForDate(dateStr){
  return Object.values(HOTELS).filter(h=>{
    const ci=parseFloat(h.checkin.replace('8.',''));
    const co=parseFloat(h.checkout.replace('8.',''));
    const d=parseFloat(dateStr.replace('8.',''));
    return d>=ci && d<co;
  });
}

const ZOOM=15, N=1<<ZOOM, MIN_X=16366, MIN_Y=10892, TILE=256, IMG_W=3072, IMG_H=1536;

function latLngToPixel(lat,lng){
  const x=(lng+180)/360*N;
  const lr=lat*Math.PI/180;
  const y=(1-Math.log(Math.tan(lr)+1/Math.cos(lr))/Math.PI)/2*N;
  return{x:(x-MIN_X)*TILE, y:(y-MIN_Y)*TILE};
}

let currentDay=0, zoomLevel=1, panX=0, panY=0;
let isDragging=false, dragStartX, dragStartY, startPanX, startPanY;
let markers=[];

const mapBox=document.getElementById('mapBox');
const mapImg=document.getElementById('mapImg');
const canvas=document.getElementById('mapCanvas');
const ctx=canvas.getContext('2d');
const tooltip=document.getElementById('mapTooltip');

function updateMap(){
  const bw=mapBox.clientWidth,bh=mapBox.clientHeight;
  const a=IMG_W/IMG_H;let dw,dh;
  if(bw/bh>a){dh=bh;dw=bh*a;}else{dw=bw;dh=bw/a;}
  mapImg.style.width=dw*zoomLevel+'px';mapImg.style.height=dh*zoomLevel+'px';
  mapImg.style.left=(bw-dw*zoomLevel)/2+panX+'px';
  mapImg.style.top=(bh-dh*zoomLevel)/2+panY+'px';
  canvas.width=bw;canvas.height=bh;drawMarkers();
}
function pxToMapPx(px,py){
  const bw=mapBox.clientWidth,bh=mapBox.clientHeight;
  const a=IMG_W/IMG_H;let dw,dh;
  if(bw/bh>a){dh=bh;dw=bh*a;}else{dw=bw;dh=bw/a;}
  const s=dw/IMG_W*zoomLevel;
  return{x:(bw-dw*zoomLevel)/2+panX+px*s, y:(bh-dh*zoomLevel)/2+panY+py*s, s};
}
function focusOnSpots(){
  const d=DAYS[currentDay]; const lon=d.spots.filter(s=>!s.york);
  if(!lon.length) return;
  let mnx=Infinity,mny=Infinity,mxx=-Infinity,mxy=-Infinity;
  lon.forEach(s=>{const p=latLngToPixel(s.lat,s.lng);mnx=Math.min(mnx,p.x);mxx=Math.max(mxx,p.x);mny=Math.min(mny,p.y);mxy=Math.max(mxy,p.y);});
  const hk=d.hotelKey?getHotel(d.hotelKey):null;
  if(hk){const p=latLngToPixel(hk.lat,hk.lng);mnx=Math.min(mnx,p.x);mxx=Math.max(mxx,p.x);mny=Math.min(mny,p.y);mxy=Math.max(mxy,p.y);}
  const cx=(mnx+mxx)/2,cy=(mny+mxy)/2,pad=80;
  const bw=mapBox.clientWidth,bh=mapBox.clientHeight;
  const a=IMG_W/IMG_H;let dw,dh;
  if(bw/bh>a){dh=bh;dw=bh*a;}else{dw=bw;dh=bw/a;}
  const sw=(mxx-mnx)/IMG_W*dw, sh=(mxy-mny)/IMG_H*dh;
  zoomLevel=Math.max(0.5,Math.min(Math.min((bw-pad*2)/Math.max(sw,1),(bh-pad*2)/Math.max(sh,1)),2.5));
  const il=(bw-dw*zoomLevel)/2, it=(bh-dh*zoomLevel)/2;
  const tx=cx/IMG_W*dw*zoomLevel+il, ty=cy/IMG_H*dh*zoomLevel+it;
  panX=(bw/2-tx)+(bw-dw*zoomLevel)/2-il;
  panY=(bh/2-ty)+(bh-dh*zoomLevel)/2-it;
  updateMap();
}

function makeMarker(x,y,html,onClick){
  const el=document.createElement('div');el.className='marker';
  el.style.left=(x-15)+'px';el.style.top=(y-15)+'px';
  el.innerHTML=html;
  if(onClick) el.addEventListener('mouseenter',onClick);
  el.addEventListener('mouseleave',()=>{tooltip.style.display='none';});
  mapBox.appendChild(el);markers.push(el);return el;
}

function drawMarkers(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  markers.forEach(m=>m.remove());markers=[];
  const d=DAYS[currentDay];
  const allLon=d.spots.filter(s=>!s.york); // 包含 mapHide，用于画线
  const lon=allLon.filter(s=>!s.mapHide);  // 不包含 mapHide，用于标记
  
  if(allLon.length<2) return;
  
  // Route lines using ROUTES waypoints (沿实际道路/河流/地铁线路)
  for(let i=1;i<allLon.length;i++){
    const prev=allLon[i-1], curr=allLon[i];
    const rk=curr.routeKey;
    let waypoints=null;
    if(rk && ROUTES[rk]) waypoints=ROUTES[rk];
    
    ctx.strokeStyle=curr.transfer?d.color+'40':d.color+'99';
    ctx.lineWidth=curr.transfer?1.5:2.5;
    ctx.setLineDash(curr.transfer?[8,5]:[]);
    
    if(waypoints && waypoints.length>=2){
      ctx.beginPath();
      // 起点强制接 prev，终点强制接 curr，消除缝隙
      let f=latLngToPixel(prev.lat,prev.lng),fp=pxToMapPx(f.x,f.y);
      ctx.moveTo(fp.x,fp.y);
      for(let j=0;j<waypoints.length;j++){
        f=latLngToPixel(waypoints[j][0],waypoints[j][1]);
        fp=pxToMapPx(f.x,f.y);
        ctx.lineTo(fp.x,fp.y);
      }
      f=latLngToPixel(curr.lat,curr.lng);fp=pxToMapPx(f.x,f.y);
      ctx.lineTo(fp.x,fp.y);
      ctx.stroke();
    } else {
      // Fallback: straight line
      const p1=pxToMapPx(latLngToPixel(prev.lat,prev.lng).x,latLngToPixel(prev.lat,prev.lng).y);
      const p2=pxToMapPx(latLngToPixel(curr.lat,curr.lng).x,latLngToPixel(curr.lat,curr.lng).y);
      ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();
    }
  }
  ctx.setLineDash([]);

  // Day 1: 额外绘制方案A(游船返回)虚线
  if(currentDay===0 && ROUTES['boat_tower_westminster']){
    const wp=ROUTES['boat_tower_westminster'];
    ctx.strokeStyle='#3498db';ctx.lineWidth=2;ctx.globalAlpha=.55;ctx.setLineDash([8,4]);
    ctx.beginPath();
    let f=latLngToPixel(wp[0][0],wp[0][1]),fp=pxToMapPx(f.x,f.y);
    ctx.moveTo(fp.x,fp.y);
    for(let j=1;j<wp.length;j++){
      f=latLngToPixel(wp[j][0],wp[j][1]);fp=pxToMapPx(f.x,f.y);
      ctx.lineTo(fp.x,fp.y);
    }
    ctx.stroke();
    // 方案A: Westminster Pier → 伦敦眼 (步行过桥)
    const walkA=[[51.502474,-0.123596],[51.5020,-0.1220],[51.5015,-0.1210],[51.5018,-0.1200],[51.5020,-0.1195],[51.5025,-0.1192],[51.5028403,-0.119368]];
    ctx.strokeStyle='#3498db';ctx.lineWidth=1.5;ctx.globalAlpha=.45;ctx.setLineDash([4,4]);
    ctx.beginPath();
    f=latLngToPixel(walkA[0][0],walkA[0][1]);fp=pxToMapPx(f.x,f.y);ctx.moveTo(fp.x,fp.y);
    for(let j=1;j<walkA.length;j++){f=latLngToPixel(walkA[j][0],walkA[j][1]);fp=pxToMapPx(f.x,f.y);ctx.lineTo(fp.x,fp.y);}
    ctx.stroke();
    ctx.globalAlpha=1;ctx.setLineDash([]);
  }

  // POI category icons (like Google Maps)
  ctx.font='14px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  const TAG_ICON={'博物馆':'🏛️','教堂':'⛪','地标':'🏛️','购物':'🛍️','公园':'🌳','景点':'⭐','历史':'🏰','交通':'🚉','游船':'🚢','酒店':'🏨','活动':'👑','其他':'📌'};
  allLon.forEach(s=>{
    if(s.mapHide) return;
    const p=latLngToPixel(s.lat,s.lng),sp=pxToMapPx(p.x,p.y);
    const icon=s.tag||'其他';
    ctx.globalAlpha=0.65;
    ctx.fillText(TAG_ICON[icon]||'📍',sp.x,sp.y-22);
    ctx.globalAlpha=1;
  });

  // Hotel pin
  const hk=d.hotelKey?getHotel(d.hotelKey):null;
  if(hk){
    const hp=latLngToPixel(hk.lat,hk.lng),hsp=pxToMapPx(hp.x,hp.y);
    const el=document.createElement('div');el.className='hotel-pin';el.style.background=hk.color;
    el.style.left=(hsp.x-15)+'px';el.style.top=(hsp.y-15)+'px';
    el.textContent='🏨';
    el.innerHTML+='<span class="mlabel">'+hk.name+'</span>';
    el.addEventListener('mouseenter',()=>{
      tooltip.style.display='block';
      tooltip.style.left=Math.min(hsp.x+20,mapBox.clientWidth-230)+'px';
      tooltip.style.top=Math.max(hsp.y-50,10)+'px';
      tooltip.innerHTML='<div class="tt-title" style="color:'+hk.color+'">'+hk.name+'</div><div class="tt-time">'+hk.checkin+' - '+hk.checkout+' · '+hk.en+'</div><div class="tt-desc">'+hk.desc+'</div>';
    });
    el.addEventListener('mouseleave',()=>{tooltip.style.display='none';});
    mapBox.appendChild(el);markers.push(el);
  }

  // Spot markers
  lon.forEach((s,i)=>{
    const p=latLngToPixel(s.lat,s.lng),sp=pxToMapPx(p.x,p.y);
    const el=document.createElement('div');
    el.className='marker'+(s.transfer?' marker-sm':'');
    el.style.left=(sp.x-(s.transfer?11:15))+'px';el.style.top=(sp.y-(s.transfer?11:15))+'px';
    el.style.background=s.transfer?d.color+'88':d.color;
    el.textContent=i+1;
    el.innerHTML+='<span class="mlabel">'+s.name+'</span>';
    el.addEventListener('mouseenter',()=>{
      tooltip.style.display='block';
      tooltip.style.left=Math.min(sp.x+20,mapBox.clientWidth-230)+'px';
      tooltip.style.top=Math.max(sp.y-50,10)+'px';
      tooltip.innerHTML='<div class="tt-title" style="color:'+d.color+'">'+s.name+'</div><div class="tt-time">'+d.date+'('+d.wd+') '+s.time+'</div><div class="tt-desc">'+s.desc+'</div>';
    });
    el.addEventListener('mouseleave',()=>{tooltip.style.display='none';});
    el.addEventListener('click',(e)=>{
      e.stopPropagation();
      showSpotDetail(s,d,i+1);
    });
    mapBox.appendChild(el);markers.push(el);
  });

  // Recommendation markers (food/shopping nearby)
  RECOMMENDATIONS.forEach(r=>{
    const p=latLngToPixel(r.lat,r.lng),sp=pxToMapPx(p.x,p.y);
    const el=document.createElement('div');
    const typeClass=r.type==='餐饮'?'rec-food':'rec-shop';
    el.className='rec-marker '+typeClass;
    el.style.left=(sp.x-10)+'px';el.style.top=(sp.y-10)+'px';
    el.textContent=r.type==='餐饮'?'🍽️':'🛍️';
    el.innerHTML+='<span class="mlabel">'+r.name+' · '+r.type+'</span>';
    el.addEventListener('mouseenter',()=>{
      tooltip.style.display='block';
      tooltip.style.left=Math.min(sp.x+20,mapBox.clientWidth-230)+'px';
      tooltip.style.top=Math.max(sp.y-50,10)+'px';
      tooltip.innerHTML='<div class="tt-title" style="color:'+r.color+'">'+r.name+'</div><div class="tt-time">'+r.area+' · '+r.type+'</div><div class="tt-desc">'+r.desc+'</div>';
    });
    el.addEventListener('mouseleave',()=>{tooltip.style.display='none';});
    el.addEventListener('click',(e)=>{
      e.stopPropagation();
      showSpotDetail(r,null,0);
    });
    mapBox.appendChild(el);markers.push(el);
  });

  // Tube station markers
  TUBE_STATIONS.forEach(s=>{
    const p=latLngToPixel(s.lat,s.lng),sp=pxToMapPx(p.x,p.y);
    const el=document.createElement('div');
    el.className='tube-marker';
    el.style.left=(sp.x-9)+'px';el.style.top=(sp.y-9)+'px';
    el.textContent='M';
    el.innerHTML+='<span class="mlabel">'+s.name+'<br><span style="opacity:.7;font-size:8px">'+s.lines+'</span></span>';
    mapBox.appendChild(el);markers.push(el);
  });

  // Toilet markers
  TOILETS.forEach(t=>{
    const p=latLngToPixel(t.lat,t.lng),sp=pxToMapPx(p.x,p.y);
    const el=document.createElement('div');
    el.className='toilet-marker'+(t.free?'':' paid');
    el.style.left=(sp.x-8)+'px';el.style.top=(sp.y-8)+'px';
    el.textContent='WC';
    el.innerHTML+='<span class="mlabel">'+t.name+' · '+(t.free?'免费':'收费')+'</span>';
    mapBox.appendChild(el);markers.push(el);
  });

  // Landmark markers
  LANDMARKS.forEach(lm=>{
    const p=latLngToPixel(lm.lat,lm.lng),sp=pxToMapPx(p.x,p.y);
    const el=document.createElement('div');
    el.className='landmark-marker';
    el.style.left=(sp.x-11)+'px';el.style.top=(sp.y-11)+'px';
    el.textContent='🏛';
    el.innerHTML+='<span class="mlabel"><b>'+lm.name+'</b> ('+lm.era+')<br><span style="opacity:.8;font-size:8px">'+lm.desc.substring(0,60)+'...</span></span>';
    el.addEventListener('click',(e)=>{
      e.stopPropagation();
      showLandmarkDetail(lm);
    });
    mapBox.appendChild(el);markers.push(el);
  });

  // Scale all markers with zoom level
  const ms=Math.max(0.7,Math.min(zoomLevel,2));
  markers.forEach(el=>{if(el&&!el.classList.contains('map-ctrl')){el.style.transform=el.style.transform.replace(/scale\([^)]*\)/,'')+' scale('+ms+')';}});
}

// ====== Spot Detail Panel ======
function showSpotDetail(s,day,idx){
  const panel=document.getElementById('spotDetail');
  const tagEl=document.getElementById('spTag');
  const titleEl=document.getElementById('spTitle');
  const timeEl=document.getElementById('spTime');
  const transportEl=document.getElementById('spTransport');
  const bodyEl=document.getElementById('spBody');

  // Support both spot objects (with day) and recommendation objects
  const isRec = !day;
  tagEl.textContent=isRec ? (s.type||'推荐') : (s.tag||'景点');
  tagEl.style.background=isRec ? (s.color||'#888') : day.color;
  titleEl.textContent=s.name;
  timeEl.textContent=isRec ? (s.area||'') : (day.date+'('+day.wd+') '+s.time);
  transportEl.textContent=isRec ? '' : (s.transport||'');

  let html='';
  if(s.desc){
    html+='<div class="sp-section"><h4>简介</h4><p>'+s.desc+'</p></div>';
  }
  if(!isRec && s.detail){
    html+=s.detail;
  }
  if(!isRec && s.transport){
    html+='<div class="sp-section"><h4>交通</h4><p>'+s.transport+'</p></div>';
  }
  bodyEl.innerHTML=html;
  panel.classList.add('active');
}
function closeSpotDetail(){
  document.getElementById('spotDetail').classList.remove('active');
}

function transportIcon(text){
  if(!text) return '';
  if(text.includes('🚢')) return '🚢';
  if(text.includes('🚂')) return '🚂';
  if(text.includes('步行') && text.includes('地铁')) return '🔄';
  if(text.includes('步行')) return '🚶';
  if(text.includes('地铁')) return '🚇';
  if(text.includes('已在')) return '🏠';
  return '→';
}

function buildTimeline(idx){
  const d=DAYS[idx], c=document.getElementById('dayContent');
  const notes=[
    '<div><span class="ricon">🚢</span><div>泰晤士河游船：<b>Westminster Pier → Tower Pier</b> 去程~25min。返回有两条路线：<b style="color:#3498db">方案A</b>游船返回+步行过桥~35min；<b style="color:#9b59b6">方案B</b>地铁Circle/District线~20min。两条路线都在地图上标注。</div></div>',
    '<div><span class="ricon">🗺️</span><div>自然历史博物馆：先逛<b>绿区</b>(恐龙/矿物)→<b>红区</b>(地球/火山)→<b>蓝区</b>(动植物)。17:50闭馆。</div></div>',
    '<div><span class="ricon">🎫</span><div>大英博物馆<b>周五晚场17:00-20:30</b>，免费需预约。必看：罗塞塔石碑(4号厅)、帕特农雕塑(18号厅)。</div></div>',
    '<div><span class="ricon">🎨</span><div>国家美术馆<b>预约16:30入场，18:00闭馆</b>。直奔梵高《向日葵》、莫奈《睡莲》、达芬奇《岩间圣母》。</div></div>',
    '<div><span class="ricon">👑</span><div>周日换岗约<b>10:00开始</b>，建议9:15前到Victoria Memorial占位。V&A和肯辛顿花园相邻。</div></div>',
    '<div><span class="ricon">🌉</span><div>塔桥<b>开桥时刻</b>请提前查官网。碎片大厦建议预约日落时段。圣保罗穹顶528级台阶。</div></div>'
  ];

  let html='<div class="day-title"><span class="badge" style="background:'+d.color+'">'+d.label+'</span> '+d.title+'</div>';
  html+='<div class="day-subtitle">'+d.subtitle+'</div>';
  if(notes[idx]) html+='<div class="route-note" style="border-color:'+d.color+'">'+notes[idx]+'</div>';

  // Hotel departure
  const hk=d.hotelKey?getHotel(d.hotelKey):null;
  if(hk){
    const isCheckinDay = hk.checkin===d.date;
    const isCheckout = d.checkoutKey===d.date;
    const action = isCheckinDay ? '今日入住' : (isCheckout ? '今日退房·换至'+getHotel(d.hotelKey).name : '出发');
    const cancelHtml = hk.cancelBy ? '<div class="hcancel">⚠ '+hk.cancelBy+'</div>' : '';
    html+='<div class="hotel-card depart"><span class="hicon">🏨</span><div><div class="hl">'+action+' · '+hk.name+'</div><div class="haddr">'+hk.desc+' · '+hk.en+cancelHtml+'</div></div></div>';
  }

  // Timeline spots with transport between them
  html+='<div class="timeline">';
  const lonSpots = d.spots.filter(s=>!s.york);
  lonSpots.forEach((s,i)=>{
    // Transport TO this spot (from previous spot or hotel)
    const t = s.transport;
    if(t && i===0 && hk){
      html+='<div class="transport-line"><span class="ticon">'+transportIcon(t)+'</span><span>'+t+'</span><span class="tdot"></span></div>';
    } else if(t && i>0){
      html+='<div class="transport-line"><span class="ticon">'+transportIcon(t)+'</span><span>'+t+'</span><span class="tdot"></span></div>';
    }
    const cls=s.transfer?'timeline-item transfer':'timeline-item';
    html+='<div class="'+cls+'" style="animation-delay:'+i*0.05+'s"><div class="time" style="color:'+d.color+'">'+s.time+'</div><div class="name">'+s.name+'</div><div class="desc">'+s.desc+'</div>'+(s.tag?'<span class="tag" style="background:'+d.color+'22;color:'+d.color+'">'+s.tag+'</span>':'')+'</div>';
  });
  html+='</div>';

  // Return to hotel
  if(d.returnTransport && hk){
    const retHotel = d.hotelKey;
    const rh = getHotel(retHotel);
    const isAlreadyThere = d.returnTransport.includes('已在');
    html+='<div class="transport-line"><span class="ticon">'+transportIcon(d.returnTransport)+'</span><span>'+d.returnTransport+'</span><span class="tdot"></span></div>';
    if(!isAlreadyThere){
      html+='<div class="hotel-card return-h"><span class="hicon">🏨</span><div><div class="hl">返回 · '+rh.name+'</div><div class="haddr">'+rh.desc+'</div></div></div>';
    } else {
      html+='<div class="hotel-card return-h"><span class="hicon">🏨</span><div><div class="hl">'+rh.name+'（碎片大厦内）</div><div class="haddr">行程结束即到酒店</div></div></div>';
    }
  }

  c.innerHTML=html;
}

function switchDay(idx){
  // Mobile: auto-close sidebar on day select
  if(window.innerWidth<=768){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebarOverlay').classList.remove('active');}
  currentDay=idx;
  document.querySelectorAll('.day-tab').forEach((t,i)=>{t.classList.toggle('active',i===idx);t.style.borderColor=i===idx?DAYS[i].color:'transparent';});
  tooltip.style.display='none';
  buildTimeline(idx);
  focusOnSpots();
}

function buildLegend(){
  const c=document.getElementById('legendBar');
  DAYS.forEach((d,i)=>{const el=document.createElement('div');el.className='legend-item';el.style.cursor='pointer';el.innerHTML='<div class="legend-color" style="background:'+d.color+'"></div>'+d.date+'('+d.wd+')';el.addEventListener('click',()=>switchDay(i));c.appendChild(el);});
  c.innerHTML+='<div class="legend-item" style="margin-left:8px;border-left:1px solid var(--border);padding-left:12px;">🏨 酒店</div>';
  c.innerHTML+='<div class="legend-item" style="margin-left:4px;"><div class="legend-color" style="background:#3498db;height:2px;border-top:2px dashed #3498db;"></div>方案A(游船)</div>';
  c.innerHTML+='<div class="legend-item" style="margin-left:8px;border-left:1px solid var(--border);padding-left:12px;"><span style="background:#E32017;color:#fff;font-size:8px;padding:1px 4px;border-radius:50%;">M</span> 地铁站</div>';
  c.innerHTML+='<div class="legend-item"><span style="background:#27ae60;color:#fff;font-size:8px;padding:1px 3px;border-radius:2px;">WC</span> 厕所(免费)</div>';
  c.innerHTML+='<div class="legend-item"><span style="background:#7f8c8d;color:#fff;font-size:8px;padding:1px 3px;border-radius:2px;">WC</span> 厕所(收费)</div>';
  c.innerHTML+='<div class="legend-item" style="margin-left:8px;border-left:1px solid var(--border);padding-left:12px;"><span style="background:rgba(142,68,173,.85);color:#fff;font-size:8px;padding:1px 4px;border-radius:2px;">🏛</span> 历史建筑</div>';
}

// ====== Zoom & Pan ======
document.getElementById('zoomIn').onclick=()=>{zoomLevel=Math.min(zoomLevel*1.3,4);updateMap();};
document.getElementById('zoomOut').onclick=()=>{zoomLevel=Math.max(zoomLevel/1.3,0.3);updateMap();};
document.getElementById('zoomReset').onclick=()=>focusOnSpots();

mapBox.addEventListener('mousedown',e=>{if(e.target.closest('.marker')||e.target.closest('.hotel-pin')||e.target.closest('.map-ctrl'))return;isDragging=true;dragStartX=e.clientX;dragStartY=e.clientY;startPanX=panX;startPanY=panY;mapBox.style.cursor='grabbing';});
window.addEventListener('mousemove',e=>{if(!isDragging)return;panX=startPanX+(e.clientX-dragStartX);panY=startPanY+(e.clientY-dragStartY);updateMap();});
window.addEventListener('mouseup',()=>{if(isDragging){isDragging=false;mapBox.style.cursor='grab';}});
mapBox.addEventListener('wheel',e=>{
  e.preventDefault();
  const delta=e.deltaY>0?0.9:1.1;
  const oldZ=zoomLevel;zoomLevel=Math.max(0.3,Math.min(zoomLevel*delta,4));
  const rect=mapBox.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const bw=mapBox.clientWidth,bh=mapBox.clientHeight;
  const a=IMG_W/IMG_H;let dw,dh;
  if(bw/bh>a){dh=bh;dw=bh*a;}else{dw=bw;dh=bw/a;}
  const oldS=dw/IMG_W*oldZ, newS=dw/IMG_W*zoomLevel;
  const oldL=(bw-dw*oldZ)/2+panX, oldT=(bh-dh*oldZ)/2+panY;
  panX=mx-(mx-oldL)*newS/oldS-(bw-dw*zoomLevel)/2;
  panY=my-(my-oldT)*newS/oldS-(bh-dh*zoomLevel)/2;
  updateMap();
},{passive:false});

// ====== Touch support (mobile) ======
let touchStartDist=0, touchStartZoom=1, touchStartPanX=0, touchStartPanY=0, touchStartMidX=0, touchStartMidY=0;
mapBox.addEventListener('touchstart',e=>{
  if(e.target.closest('.marker')||e.target.closest('.rec-marker')||e.target.closest('.tube-marker')||e.target.closest('.toilet-marker')||e.target.closest('.landmark-marker')||e.target.closest('.map-ctrl')||e.target.closest('#spotDetail'))return;
  if(e.touches.length===1){
    isDragging=true;dragStartX=e.touches[0].clientX;dragStartY=e.touches[0].clientY;startPanX=panX;startPanY=panY;
  }else if(e.touches.length===2){
    isDragging=false;
    const dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY;
    touchStartDist=Math.sqrt(dx*dx+dy*dy);
    touchStartZoom=zoomLevel;
    touchStartPanX=panX;touchStartPanY=panY;
    touchStartMidX=(e.touches[0].clientX+e.touches[1].clientX)/2;
    touchStartMidY=(e.touches[0].clientY+e.touches[1].clientY)/2;
  }
},{passive:true});

mapBox.addEventListener('touchmove',e=>{
  if(e.touches.length===1&&isDragging){
    panX=startPanX+(e.touches[0].clientX-dragStartX);
    panY=startPanY+(e.touches[0].clientY-dragStartY);
    updateMap();
  }else if(e.touches.length===2&&touchStartDist>0){
    const dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const scale=dist/touchStartDist;
    const oldZ=zoomLevel;
    zoomLevel=Math.max(0.3,Math.min(touchStartZoom*scale,4));
    const rect=mapBox.getBoundingClientRect();
    const mx=touchStartMidX-rect.left, my=touchStartMidY-rect.top;
    const bw=mapBox.clientWidth,bh=mapBox.clientHeight;
    const a=IMG_W/IMG_H;let dw,dh;
    if(bw/bh>a){dh=bh;dw=bh*a;}else{dw=bw;dh=bw/a;}
    const oldS=dw/IMG_W*oldZ, newS=dw/IMG_W*zoomLevel;
    const oldL=(bw-dw*oldZ)/2+touchStartPanX, oldT=(bh-dh*oldZ)/2+touchStartPanY;
    panX=mx-(mx-oldL)*newS/oldS-(bw-dw*zoomLevel)/2;
    panY=my-(my-oldT)*newS/oldS-(bh-dh*zoomLevel)/2;
    updateMap();
  }
},{passive:true});

mapBox.addEventListener('touchend',()=>{isDragging=false;touchStartDist=0;});
// Prevent click after drag on mobile
let touchMoved=false;
mapBox.addEventListener('touchmove',()=>{touchMoved=true;},{passive:true});
mapBox.addEventListener('touchstart',()=>{touchMoved=false;},{passive:true});
mapBox.addEventListener('click',e=>{if(touchMoved){touchMoved=false;e.stopImmediatePropagation();}},{capture:true});

mapBox.style.cursor='grab';
buildTabs();buildLegend();switchDay(0);
</script>
